<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Flags Quiz</title>
    <link rel="stylesheet" href="web.css">
</head>

<body>
    <div class="main">
        <h1 id="worldFlagsText">World Flags Quiz</h1>

        <h2 id="worldCountryQuestion">What Country Is This Called?</h2>

        <img id="flagImg" src="" alt="Country flag">

        <div class="startButtonBounds">
            <button id="startButton">START</button>
        </div>

        <div class="textBox">
            <input type="text" id="text-input" maxlength="50" placeholder="Enter Country">
        </div>

        <div class="countriesButtonBounds">
            <button id="countriesButton">SUBMIT</button>
        </div>
        <p id="resultText"></p>

        <div class="nextButtonBounds">
            <button id="nextButton">NEXT</button>
        </div>
        
    </div>

    <script src="web.js"></script>
    <!-- <script src="../Backend/app.js"></script> -->
    <!-- Do NOT include the above line! This includes this javasript in the browser side, which does not work! -->
    </body>
</html>
